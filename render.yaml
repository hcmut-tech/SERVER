services:
  - type: web
    name: bkarch-api
    env: python
    region: singapore   # gần Việt Nam nhất
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bkarch-db
          property: connectionString

databases:
  - name: bkarch-db
    plan: free
    region: singapore
